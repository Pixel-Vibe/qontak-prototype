<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login Wireframe</title>
  </head>
  <body
    style="margin: 0; background: #e2e8f0; display: flex; justify-content: center; padding: 40px"
  >
    <svg
      viewBox="0 0 680 520"
      width="680"
      xmlns="http://www.w3.org/2000/svg"
      font-family="Inter, sans-serif"
    >
      <!-- Page background -->
      <rect width="680" height="520" fill="#F1F5F9" rx="4" />

      <!-- Page bg label -->
      <text x="12" y="18" fill="#94A3B8" font-size="10">surface #F1F5F9 — page background</text>

      <!-- Center card -->
      <rect
        x="140"
        y="36"
        width="400"
        height="432"
        rx="8"
        fill="#FFFFFF"
        stroke="#DCDFE4"
        stroke-width="1"
      />

      <!-- Logo placeholder -->
      <rect x="260" y="68" width="160" height="36" rx="6" fill="#F1F5F9" />
      <text x="340" y="91" text-anchor="middle" fill="#4B61DC" font-size="14" font-weight="600">
        [ Qontak Logo ]
      </text>

      <!-- Divider line under logo -->
      <line x1="172" y1="124" x2="508" y2="124" stroke="#DCDFE4" stroke-width="1" />

      <!-- H1 -->
      <text x="172" y="160" fill="#272B32" font-size="20" font-weight="600">Sign in to Qontak</text>

      <!-- Subtitle -->
      <text x="172" y="180" fill="#656F80" font-size="12">
        Enter your credentials to access your account.
      </text>

      <!-- Email label -->
      <text x="172" y="218" fill="#272B32" font-size="14" font-weight="600">Email</text>
      <text x="209" y="218" fill="#C33E35" font-size="14" font-weight="600">*</text>

      <!-- Email input -->
      <rect
        x="172"
        y="226"
        width="336"
        height="40"
        rx="6"
        fill="#FFFFFF"
        stroke="#DCDFE4"
        stroke-width="1"
      />
      <text x="184" y="251" fill="#9CA3AF" font-size="13">e.g. john@mekari.com</text>

      <!-- Password label -->
      <text x="172" y="294" fill="#272B32" font-size="14" font-weight="600">Password</text>
      <text x="244" y="294" fill="#C33E35" font-size="14" font-weight="600">*</text>

      <!-- Password input -->
      <rect
        x="172"
        y="302"
        width="336"
        height="40"
        rx="6"
        fill="#FFFFFF"
        stroke="#DCDFE4"
        stroke-width="1"
      />
      <text x="184" y="327" fill="#9CA3AF" font-size="13">Enter your password</text>
      <!-- Eye icon placeholder -->
      <circle cx="494" cy="322" r="8" fill="none" stroke="#DCDFE4" stroke-width="1.5" />
      <circle cx="494" cy="322" r="3" fill="#DCDFE4" />

      <!-- Error state annotation -->
      <text x="172" y="356" fill="#C33E35" font-size="11">
        ⚠ on error: "Email or password is incorrect." shown here
      </text>

      <!-- Sign in button -->
      <rect x="172" y="370" width="336" height="40" rx="6" fill="#4B61DC" />
      <text x="340" y="395" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">
        Sign in
      </text>

      <!-- Annotation: dummy creds -->
      <rect
        x="172"
        y="424"
        width="336"
        height="28"
        rx="4"
        fill="#FEF3C7"
        stroke="#D97706"
        stroke-width="1"
      />
      <text x="184" y="442" fill="#92400E" font-size="11">
        Dummy: admin@qontak.com / password123 (hardcoded)
      </text>

      <!-- outer annotations -->
      <text x="548" y="258" fill="#94A3B8" font-size="10">← MpInput</text>
      <text x="548" y="334" fill="#94A3B8" font-size="10">← MpInput</text>
      <text x="548" y="395" fill="#94A3B8" font-size="10">← MpButton</text>
      <text x="548" y="391" fill="#94A3B8" font-size="10">primary</text>

      <!-- card label -->
      <text x="12" y="52" fill="#94A3B8" font-size="10">stage #FFFFFF — card</text>
    </svg>
  </body>
</html>
